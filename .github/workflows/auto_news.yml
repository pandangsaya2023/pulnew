name: Robot Ambil Berita Otomatis

on:
  workflow_dispatch: # Biar bisa diklik manual pakai tombol Run Workflow
  schedule:
    - cron: '0 */2 * * *' # Berjalan otomatis setiap 2 jam

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Memeriksa Repositori Kode
        uses: actions/checkout@v4

      - name: Menyiapkan Sistem Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install openai
          pip install beautifulsoup4
          pip install lxml

      - name: Menjalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python ambil_berita.py

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts.json
          git diff-index --quiet HEAD || git commit -m "Update database berita (Manual + Robot)"
          git push
