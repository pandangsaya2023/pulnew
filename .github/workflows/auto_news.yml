- name: Menggabungkan Berita Manual & Robot
  run: |
    # 1. Pastikan jq terinstall
    sudo apt-get install -y jq
          
    # 2. Buat file posts.json baru dari hasil robot dan berita manual
    # Kita ambil array posts dari hasil robot terlebih dahulu
    # Lalu kita gabungkan dengan file-file di public/posts/*.json
          
    # Buat file sementara
    echo '{"posts": []}' > temp_gabungan.json
          
    # Masukkan hasil dari robot ke dalam temp_gabungan.json
    jq -s '.[0].posts + .[1:]' public/posts.json <(jq -s '.' public/posts/*.json) > final.json
          
    # 3. Urutkan berdasarkan tanggal (Terbaru di atas)
    jq '.posts |= sort_by(.date) | .posts |= reverse' final.json > public/posts.json
          
    # Hapus file sementara
    rm temp_gabungan.json final.json

- name: Menyimpan Perubahan Kembali ke GitHub
  run: |
    git config --global user.name "github-actions[bot]"
    git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
    git add public/posts.json
    git diff-index --quiet HEAD || git commit -m "Update gabungan berita manual dan robot"
    git push
