name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Jalankan Robot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Pecah posts.json ke Folder (Agar bisa diedit di CMS)
        run: |
          mkdir -p public/posts
          # Menggunakan jq untuk memecah array posts menjadi file individual
          jq -c '.posts[]' public/posts.json | while read -r line; do
            slug=$(echo $line | jq -r '.slug')
            echo $line | jq '.' > "public/posts/$slug.json"
          done

      - name: Sinkronisasi dan Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/posts/
          git diff-index --quiet HEAD || (git commit -m "Update otomatis: Sinkronisasi CMS & Robot" && git push)

