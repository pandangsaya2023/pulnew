name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */7 * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions: #
        contents: write
        pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml

      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Buat Pull Request Otomatis
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Update berita otomatis + preview WA"
          title: "Update Berita Otomatis - ${{ github.run_number }}"
          body: "Robot berhasil ambil berita baru. Silakan review sebelum merge."
          branch: auto-news-update
          add-paths: |
            public/posts/
            berita/
            images/
          delete-branch: true
      
