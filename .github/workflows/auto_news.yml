name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml

      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Menggabungkan Berita Manual & Robot
        run: |
          sudo apt-get install -y jq
          # Membuat folder jika belum ada
          mkdir -p public/posts
          
          # Menggabungkan semua file JSON di folder public/posts/ menjadi satu file posts.json
          # Kita pastikan setiap item memiliki key "posts"
          jq -s '{posts: [.[].posts[]]}' public/posts/*.json > temp_merge.json
          
          # Mengurutkan berdasarkan tanggal terbaru dan memastikan slug unik
          jq '.posts |= unique_by(.slug) | .posts |= sort_by(.date) | .posts |= reverse' temp_merge.json > public/posts.json
          
          # Hapus file sementara
          rm temp_merge.json

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts/ public/posts.json
          git diff-index --quiet HEAD || git commit -m "Update berita gabungan dan otomatis"
          git pull --rebase origin main || true
          git push
