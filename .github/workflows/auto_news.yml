name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml
      
      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Pecah Otomatis ke Folder (Otomatisasi)
        run: |
          mkdir -p public/posts
          # Memastikan jq terinstall (bawaan ubuntu sudah ada)
          # Mengambil setiap objek di dalam array "posts" di posts.json dan membuat file baru
          jq -c '.posts[]' public/posts.json | while read -r line; do
            # Mengambil slug untuk dijadikan nama file
            slug=$(echo $line | jq -r '.slug')
            # Menyimpan sebagai file .json yang rapi
            echo $line | jq '.' > "public/posts/$slug.json"
          done

      - name: Commit dan Push Otomatis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tambahkan semua perubahan di folder public/posts dan posts.json
          git add public/posts/ public/posts.json
          git diff-index --quiet HEAD || (git commit -m "Update otomatis: Berita dipecah ke folder" && git push)
