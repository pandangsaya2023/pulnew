name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml

      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Menggabungkan Berita Manual & Robot
        run: |
          sudo apt-get install -y jq
          mkdir -p public/posts
          
          # Membuat file posts.json dari semua file di public/posts/
          # Kita gunakan -s untuk mengumpulkan semua dan 'add' untuk menggabungkan array
          jq -s 'map(.posts) | add | unique_by(.slug) | sort_by(.date) | reverse | {posts: .}' public/posts/*.json > public/posts.json

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts/ public/posts.json
          git diff-index --quiet HEAD || git commit -m "Update berita otomatis"
          git push
