name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml
      
      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Gabungkan & Update Berita
        run: |
          # 1. Pastikan folder posts ada
          mkdir -p public/posts
          
          # 2. Gabungkan semua file .json di public/posts/ menjadi satu array
          # Kita gunakan jq untuk membaca semua file dan menggabungkannya
          jq -s '{posts: [.[].posts[]]}' public/posts/*.json > public/posts.json
          
          # 3. Urutkan berdasarkan tanggal terbaru (paling atas)
          jq '.posts |= sort_by(.date) | .posts |= reverse' public/posts.json > temp.json && mv temp.json public/posts.json

      - name: Commit dan Push Otomatis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tambahkan semua perubahan di folder public/posts dan posts.json
          git add public/posts/ public/posts.json
          git diff-index --quiet HEAD || (git commit -m "Update otomatis: Berita dipecah ke folder" && git push)
