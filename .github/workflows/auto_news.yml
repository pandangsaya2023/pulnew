name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml

      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      - name: Menggabungkan Berita Manual & Robot + Auto Potong Content
        run: |
          sudo apt-get install -y jq

          # Gabungkan semua file JSON + auto bikin content dari 180 karakter body
          jq -s '
            map(
              if.body then
               .content = (.body[0:180] | rtrimstr(" ") | rtrimstr(",") | rtrimstr(".") | rtrimstr("!") | rtrimstr("?")) + "..."
              else. end
            )
            | {posts:.}
            |.posts |= sort_by(.date)
            |.posts |= reverse
          ' public/posts/*.json > public/posts.json

          rm -f temp_gabungan.json final.json

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts.json
          git diff-index --quiet HEAD || git commit -m "Update gabungan berita manual dan robot"
          git push
