name: Robot Ambil Berita Otomatis

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Memeriksa Repositori Kode
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Menyiapkan Sistem Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Menjalankan Robot Pengambil Berita
      run: python ambil_berita.py

    - name: Menyimpan Perubahan Kembali ke GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Robot Berita Otomatis"
        git config --global user.email "bot@pulnew.com"
        git add public/posts.json
        
        # Paksa commit jika ada perubahan, jika tidak ada lewati aman
        if ! git diff --cached --quiet; then
          git commit -m "Update berita otomatis dari media daerah"
          git push origin main
        else
          echo "Tidak ada perubahan data berita terbaru."
        fi
