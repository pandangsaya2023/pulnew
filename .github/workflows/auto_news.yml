name: Robot Ambil Berita Otomatis
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *' # jalan tiap 2 jam

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Menyiapkan Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai beautifulsoup4 lxml

      - name: Jalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ambil_berita.py

      #- name: Menggabungkan Berita Manual & Robot
        #run: |
          #sudo apt-get install -y jq

          # Kalau final.json belum ada, bikin array kosong biar gak error
          #[ -f final.json ] || echo '[]' > final.json

          # Gabungkan semua file json di public/posts/ jadi 1 array
          #jq -s '.' public/posts/*.json > semua_berita.json

          # Merge sama data lama, hapus duplikat berdasarkan slug, urutkan terbaru
          #jq -s 'add | unique_by(.slug) | sort_by(.date) | reverse' final.json semua_berita.json > public/posts.json

          # Backup final.json buat run berikutnya
          #cp public/posts.json final.json

          # Bersih-bersih file sementara
          #rm semua_berita.json

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts/
          
          git diff-index --quiet HEAD || git commit -m "Update berita otomatis + preview"
          git push
