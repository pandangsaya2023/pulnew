name: Robot Ambil Berita Otomatis

on:
  workflow_dispatch: # Biar bisa diklik manual pakai tombol Run Workflow
  schedule:
    - cron: '0 */2 * * *' # Berjalan otomatis setiap 2 jam

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Memeriksa Repositori Kode
        uses: actions/checkout@v4

      - name: Menyiapkan Sistem Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install openai
          pip install beautifulsoup4
          pip install lxml

      - name: Menjalankan Robot Pengambil Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python ambil_berita.py

      - name: Menggabungkan Berita Manual & Otomatis
        run: |
          # 1. Pastikan folder public/posts ada
          mkdir -p public/posts
          
          # 2. Buat file sementara untuk menampung semua berita
          echo '{"posts": [' > temp.json
          
          # 3. Masukkan semua berita manual (dari folder public/posts/*.json)
          # Gunakan jq untuk memastikan format file manual valid
          if ls public/posts/*.json 1> /dev/null 2>&1; then
            jq -c '.' public/posts/*.json | sed '$!s/$/,/' >> temp.json
          fi
          
          # 4. Tambahkan koma jika ada berita robot yang akan ditambahkan
          echo ',' >> temp.json
          
          # 5. Masukkan data hasil robot (asumsi robot menghasilkan data di posts.json)
          # Kita ambil array posts dari file yang sudah ada
          jq -c '.posts[]' public/posts.json | sed '$!s/$/,/' >> temp.json
          
          # 6. Tutup file JSON
          echo ']}' >> temp.json
          
          # 7. Timpa posts.json dengan hasil gabungan
          mv temp.json public/posts.json

      - name: Menyimpan Perubahan Kembali ke GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/posts.json
          git diff-index --quiet HEAD || git commit -m "Update database berita (Manual + Robot)"
          git push
