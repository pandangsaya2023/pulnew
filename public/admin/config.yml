backend:
  name: github
  repo: pandangsaya2023/pulnew
  branch: main

media_folder: public/media
public_folder: /media

collections:
  - name: "posts"
    label: "Berita"
    files:
      - file: "public/posts.json"
        name: "daftar_berita"
        label: "Daftar Berita"
        fields:
          - label: "Daftar Berita"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string", required: true}
              - {label: "Slug", name: "slug", widget: "string", required: true} # WAJIB ADA
              #- {label: "Kategori", name: "kategori", widget: "select", options: ["NASIONAL", "POLITIK", "TEKNOLOGI", "EKONOMI", "OLAHRAGA"]}
              - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ"}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Body", name: "body", widget: "markdown", required: true}
