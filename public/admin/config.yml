backend:
  name: github
  repo: pandangsaya2023/pulnew
  branch: main
  auth_type: oauth
  app_id: Ov23liERy7oEI6sKCO8a
media_folder: "public/images"
public_folder: "/images"
collections:
  - name: "posts"
    label: "Berita"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Slug", name: "slug", widget: "string"}
      - {label: "Tanggal", name: "date", widget: "datetime"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Politik", "Ekonomi", "Hiburan"]}
      - {label: "Gambar", name: "image", widget: "image"}
      - {label: "Isi", name: "body", widget: "markdown"}
