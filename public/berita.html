<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita - PULNEW</title>
    
</head>
<body>

    <div class="header-container">
        <div class="logo-bar">
            <a href="https://pulnew.pages.dev/"><img src="https://raw.githubusercontent.com/pandangsaya2023/pulnew/main/logopulnew2.png" class="logo-img"></a>
            <div id="live-date" style="font-size: 12px;"></div>
        </div>
    </div>

    <div class="container">
        <div id="content-area">Memuat berita...</div>
        
        <h3 style="margin-top:40px;">Berita Terkait Lainnya</h3>
        <div class="news-grid" id="recommendation-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 PULNEW.com. All Rights Reserved.</p>
    </footer>

    <div id="btnScrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>

    <script>
    document.getElementById('live-date').textContent = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });

    window.onscroll = () => {
        document.getElementById('btnScrollTop').style.display = (window.scrollY > 300) ? "flex" : "none";
    };

    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        if (!slugTujuan) return;

        try {
            const response = await fetch('https://raw.githubusercontent.com/pandangsaya2023/pulnew/main/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            const posts = data.posts || [];
            const post = posts.find(p => p.slug === slugTujuan);
            
            if (post) {
                document.getElementById('content-area').innerHTML = `
                    <div class="article-wrapper">
                        <span class="article-category">${post.category || 'Berita'}</span>
                        <h1 class="article-title">${post.title}</h1>
                        <img src="${post.image}" class="main-image">
                        <div class="article-body">${post.body.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
                
                const container = document.getElementById('recommendation-container');
                posts.filter(p => p.slug !== slugTujuan).slice(0, 6).forEach((p, i) => {
                    const cls = i === 0 ? 'grid-span-full' : (i < 4 ? 'grid-span-2' : 'grid-span-3');
                    container.innerHTML += `
                        <a href="/berita.html?slug=${p.slug}" class="news-card ${cls}">
                            <img src="${p.image}">
                            <p style="font-size: 12px; font-weight: bold;">${p.title}</p>
                        </a>
                    `;
                });
            }
        } catch (e) {
            document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
