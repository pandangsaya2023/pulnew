<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Detail Berita</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #ffffff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo-text { font-size: 20px; font-weight: 900; color: #1a237e; }
        .btn-beranda { background: #e3f2fd; color: #1565c0; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; text-decoration: none; border: 1px solid #bbdefb; }

        .content-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
        .article-box { max-width: 600px; margin: 0 auto; }
        .article-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; line-height: 1.2; }
        .main-image { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .article-body { font-size: 16px; line-height: 1.5; color: #333; text-align: justify; }
        .article-body p { margin-bottom: 10px; }

        /* RUNNING TEKS DENGAN LABEL STATIS */
        .footer-ticker { 
            background: #e0f7fa; /* Warna sejuk */ 
            color: #006064; 
            padding: 8px 10px; 
            font-size: 13px; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            z-index: 100;
        }
        .static-label { font-weight: 900; margin-right: 15px; z-index: 101; background: #e0f7fa; padding-right: 5px; }
        .ticker-container { flex: 1; overflow: hidden; white-space: nowrap; }
        .ticker-content { display: inline-block; animation: scroll 40s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-text">PUL<span>NEW</span>.com</div>
            <a href="https://pulnew.pages.dev/" class="btn-beranda">← Beranda</a>
        </header>

        <div class="content-wrapper">
            <div class="article-box" id="content-area">Memuat berita...</div>
            <div style="height: 60px;"></div> </div>

        <div class="footer-ticker">
            <div class="static-label">INFO NEWS</div>
            <div class="ticker-container">
                <div class="ticker-content" id="running-text">Memuat semua berita...</div>
            </div>
        </div>
    </div>

    <script>
    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        try {
            const response = await fetch('https://pandangsaya2023.github.io/pulnew/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            
            // 1. Tampilkan Artikel Utama
            const post = data.posts.find(p => p.slug === slugTujuan);
            if (post) {
                const isiBerita = post.body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
                document.getElementById('content-area').innerHTML = `
                    <h1 class="article-title">${post.title}</h1>
                    <img src="${post.image}" class="main-image">
                    <div class="article-body">${isiBerita}</div>
                `;
            }

            // 2. Tampilkan SEMUA judul berita di Running Text
            const semuaJudul = data.posts.map(p => p.title).join(' | ');
            document.getElementById('running-text').textContent = semuaJudul + " | " + semuaJudul; 
            
        } catch (e) { document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan."; }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
