<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Membaca Berita</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #fcfcfc; color: #2d3436; line-height: 1.8; }
        
        /* Layout Utama */
        .page-wrapper { max-width: 700px; margin: 0 auto; padding: 20px; }
        
        /* Header Minimalis */
        header { padding: 30px 0; text-align: center; }
        .logo-text { font-size: 28px; font-weight: 900; color: #1a237e; letter-spacing: -1px; }
        .logo-text span { color: #d32f2f; }

        /* Area Berita */
        .article-category { display: inline-block; background: #d32f2f; color: white; padding: 4px 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; border-radius: 4px; margin-bottom: 15px; }
        .article-title { font-size: 36px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; color: #000; }
        .main-image { width: 100%; height: auto; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .article-content { font-size: 19px; color: #444; text-align: justify; }
        
        /* Navigasi Balik */
        .back-nav { margin-top: 50px; text-align: center; }
        .back-nav a { color: #d32f2f; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <a href="https://pulnew.pages.dev/" style="text-decoration:none;">
                <div class="logo-text">PUL<span>NEW</span>.com</div>
            </a>
        </header>

        <div id="content-area">
            <p>Sedang memuat berita...</p>
        </div>

        <div class="back-nav">
            <a href="https://pulnew.pages.dev/">← Kembali ke Beranda</a>
        </div>
    </div>

    <script>
    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        if (!slugTujuan) return;
        
        try {
            const response = await fetch('https://pandangsaya2023.github.io/pulnew/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            const post = data.posts.find(p => p.slug === slugTujuan);
            
            if (post) {
                document.getElementById('content-area').innerHTML = `
                    <span class="article-category">${post.category || 'BERITA'}</span>
                    <h1 class="article-title">${post.title}</h1>
                    <img src="${post.image}" class="main-image">
                    <div class="article-content">${post.body.replace(/\n/g, '<br><br>')}</div>
                `;
            } else {
                document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
            }
        } catch (e) {
            document.getElementById('content-area').innerHTML = "Gagal memuat.";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
