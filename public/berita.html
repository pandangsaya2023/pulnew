<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Membaca Berita</title>
    <style>
        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; color: #2d3436; line-height: 1.6; }
        
        /* Container Utama */
        .page-wrapper { max-width: 650px; margin: 0 auto; padding: 15px; }

        /* Header Minimalis dengan Logo & Navigasi */
        header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .logo-text { font-size: 22px; font-weight: 900; color: #1a237e; }
        .logo-text span { color: #d32f2f; }
        .back-link { font-size: 13px; font-weight: bold; color: #d32f2f; text-decoration: none; background: #fff1f1; padding: 6px 12px; border-radius: 20px; border: 1px solid #ffcdd2; }

        /* Area Berita */
        .article-category { color: #d32f2f; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .article-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 15px; color: #000; word-wrap: break-word; }
        .main-image { width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
        
        /* FIX UNTUK TULISAN MELEBAR */
        .article-content { 
            font-size: 17px; 
            color: #333; 
            text-align: justify; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            hyphens: auto; 
        }
        .article-content a { color: #1a237e; word-break: break-all; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <a href="https://pulnew.pages.dev/" style="text-decoration:none;">
                <div class="logo-text">PUL<span>NEW</span>.com</div>
            </a>
            <a href="https://pulnew.pages.dev/" class="back-link">← Beranda</a>
        </header>

        <div id="content-area">
            <p>Memuat berita...</p>
        </div>
    </div>

    <script>
    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        if (!slugTujuan) return;
        
        try {
            const response = await fetch('https://pandangsaya2023.github.io/pulnew/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            const post = data.posts.find(p => p.slug === slugTujuan);
            
            if (post) {
                document.getElementById('content-area').innerHTML = `
                    <span class="article-category">${post.category || 'BERITA'}</span>
                    <h1 class="article-title">${post.title}</h1>
                    <img src="${post.image}" class="main-image">
                    <div class="article-content">${post.body.replace(/\n/g, '<br><br>')}</div>
                `;
            } else {
                document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
            }
        } catch (e) {
            document.getElementById('content-area').innerHTML = "Gagal memuat.";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
