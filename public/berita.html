<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berita</title>
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f5f5f5; }
 .header { background:#fff; padding:10px 20px; border-bottom:2px solid #eee; }
 .logo { font-size:24px; font-weight:bold; color:#0033cc; }
 .logo a { text-decoration:none; color:inherit; }
 .container { max-width:800px; margin:30px auto; padding:0 20px; }
 .article { background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
 .article img { width:100%; height:auto; border-radius:8px; margin-bottom:20px; }
 .article h1 { margin:0 0 15px; font-size:32px; }
 .meta { color:#666; font-size:14px; margin-bottom:20px; }
 .content { line-height:1.7; font-size:16px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><a href="/">PUL<span style="color:#cc0000">Berita</span>.com</a></div>
</div>

<div class="container" id="content">
  <div>Loading...</div>
</div>

<script>
async function loadPost(){
  const posts = await fetch('/posts.json').then(r=>r.json()).catch(()=>[]);
  const slug = window.location.pathname.split('/').pop();
  const post = posts.find(p => p.slug === slug);

  if(!post){
    document.getElementById('content').innerHTML = '<div>Post tidak ditemukan</div>';
    document.title = '404 - Not Found';
    return;
  }

  document.title = post.title + ' - PULNEW.com';
  document.getElementById('content').innerHTML = `
    <div class="article">
      <img src="/${post.image}" alt="${post.title}">
      <h1>${post.title}</h1>
      <div class="meta">${post.date} • ${post.category}</div>
      <div class="content">${post.content || 'Isi berita belum diisi'}</div>
    </div>
  `;
}

loadPost();
</script>

</body>
</html>
