<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Detail Berita</title>
    <style>
        /* Pengaturan Dasar */
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #ffffff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .logo-text { font-size: 20px; font-weight: 900; color: #1a237e; }
        .logo-text span { color: #d32f2f; }
        .btn-beranda { background: #e3f2fd; color: #1565c0; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; text-decoration: none; border: 1px solid #bbdefb; }

        /* AREA KONTEN */
        .content-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
        .article-box { max-width: 600px; margin: 0 auto; }
        .article-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; line-height: 1.2; }
        .main-image { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .article-body { font-size: 16px; line-height: 1.5; color: #333; text-align: justify; word-break: break-word; }
        .article-body p { margin-bottom: 10px; }

        /* RUNNING TEXT (SAMA PERSIS DENGAN INDEX) */
        .footer-ticker { background: #d32f2f; color: white; padding: 8px 0; font-size: 13px; overflow: hidden; width: 100%; position: fixed; bottom: 0; left: 0; z-index: 999; }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-text">PUL<span>NEW</span>.com</div>
            <a href="https://pulnew.pages.dev/" class="btn-beranda">← Beranda</a>
        </header>

        <div class="content-wrapper">
            <div class="article-box" id="content-area">
                Memuat berita...
            </div>
            <div style="height: 40px;"></div>
        </div>

        <div class="footer-ticker">
            <div class="ticker-content" id="running-text">
                MEMUAT INFORMASI TERKINI...
            </div>
        </div>
    </div>

    <script>
      async function muatHalamanBerita() {
      const slugTujuan = new URLSearchParams(window.location.search).get('slug');
      console.log("Slug:", slugTujuan);

      if (!slugTujuan) {
          document.getElementById('content-area').innerHTML = "Slug tidak ada di URL.";
          return;
      }

      try {
          const url = `./posts/${slugTujuan}.json?t=` + Date.now();
          console.log("Fetch URL:", url);
        
          const response = await fetch(url);
        
          if (!response.ok) {
              throw new Error('HTTP ' + response.status);
          }

          const post = await response.json();
          console.log("Data post:", post);
        
          // Cek kalau data nya kosong
          if (!post.title) {
              throw new Error('Data berita kosong');
          }

          const isiBerita = post.body ? post.body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('') : '<p>Tidak ada isi.</p>';
        
          document.getElementById('content-area').innerHTML = `
              <h1 class="article-title">${post.title}</h1>
              <img src="${post.image}" class="main-image" onerror="this.style.display='none'">
              <div class="article-body">${isiBerita}</div>
          `;
        
          document.getElementById('running-text').textContent = "INFO NEWS: " + post.title;

      } catch (e) {
          document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
          console.error("Error detail:", e);
      }
}
muatHalamanBerita();
</script>
</body>
</html>
