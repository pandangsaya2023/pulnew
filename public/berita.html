<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Detail Berita</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #ffffff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .logo-text { font-size: 20px; font-weight: 900; color: #1a237e; }
        .logo-text span { color: #d32f2f; }
        .btn-beranda { background: #e3f2fd; color: #1565c0; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; text-decoration: none; border: 1px solid #bbdefb; }

        .content-wrapper { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 60px; }
        .article-box { max-width: 600px; margin: 0 auto; }
        .article-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; line-height: 1.3; }
        .main-image { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .article-body { font-size: 16px; line-height: 1.7; color: #333; text-align: justify; word-break: break-word; }
        .article-body p { margin-bottom: 15px; }

        /* Berita terkait */
        .related-section { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .related-title { font-size: 18px; font-weight: 800; color: #1a237e; margin-bottom: 12px; }
        .related-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; }
        .related-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .related-item h4 { font-size: 14px; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0; }

        .footer-ticker { background: #d32f2f; color: white; padding: 8px 0; font-size: 13px; overflow: hidden; width: 100%; position: fixed; bottom: 0; left: 0; z-index: 999; }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .ad-slot {
            margin: 25px auto;
            text-align: center;
        }
        .ad-slot img {
            width: 100%;
            height: auto;
           .display: block;
            border-radius: 8px;
        }
        .ad-news-top, .ad-news-middle {
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-text">PUL<span>NEW</span>.com</div>
            <a href="https://pulnew.pages.dev/" class="btn-beranda">← Beranda</a>
        </header>

        <div class="content-wrapper">
            <div class="article-box" id="content-area">
                Memuat berita...
            </div>
        </div>

        <div class="footer-ticker">
            <div class="ticker-content" id="running-text">
                MEMUAT INFORMASI TERKINI...
            </div>
        </div>
    </div>

    <script>
    async function fetchPosts() {
        const maxRetry = 3;
        for (let i = 0; i < maxRetry; i++) {
            try {
                const res = await fetch('/api/posts?t=' + Date.now() + '&r=' + Math.random(), {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                return Array.isArray(data) ? data : data.urls || [];
            } catch (err) {
                if (i === maxRetry - 1) return [];
                await new Promise(r => setTimeout(r, 500 * (i + 1)));
            }
        }
    }

    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        const contentArea = document.getElementById('content-area');
        const runningText = document.getElementById('running-text');

        if (!slugTujuan) {
            contentArea.innerHTML = "Slug tidak ditemukan.";
            return;
        }

        try {
            const urls = await fetchPosts();

            if (!urls || urls.length === 0) {
                contentArea.innerHTML = "Berita tidak ditemukan atau sedang update.<br><small>Silakan kembali ke beranda dan coba lagi</small>";
                runningText.textContent = "INFO NEWS: PULNEW.com - Update Informasi Terkini";
                return;
            }

            // Ambil semua data berita
            const posts = await Promise.all(
                urls.slice(0, 20).map(url => fetch(url).then(r => r.json()))
            );

            posts.sort((a, b) => new Date(b.date || b.created_at) - new Date(a.date || a.created_at));

            // Cari berita yang sedang dibuka
            //const post = posts.find(p => p.slug === slugTujuan);
            //if (!post) {
                //contentArea.innerHTML = "Berita tidak ditemukan.<br><small>Mungkin sudah dihapus atau pindah</small>";
                //return;
            //}

            // Cari berdasarkan URL, bukan slug field
            const postUrl = urls.find(u => u.toLowerCase().includes(slugTujuan.toLowerCase()));
            if (!postUrl) {
                contentArea.innerHTML = "Berita tidak ditemukan.<br><small>Mungkin sudah dihapus atau pindah</small>";
                return;
            }

            const post = await fetch(postUrl).then(r => r.json());

            let html = `
                <h1 class="article-title">${post.title}</h1>
                
                <!-- Iklan Atas Berita -->
                <div class="ad-slot ad-news-top">
                    <a href="https://link-iklan-anda.com" target="_blank" rel="nofollow">
                        <img src="https://pulnew.pages.dev/iklan_atas1.png" alt="Iklan">
                    </a>
                </div>

                <img src="${post.image}" class="main-image" alt="${post.title}">
                
                <div class="article-body">${isiBerita}</div>

                <!-- Iklan Tengah Berita -->
                <div class="ad-slot ad-news-middle">
                    <a href="https://link-iklan-anda.com" target="_blank" rel="nofollow">
                        <img src="https://pulnew.pages.dev/iklan_tengah1.png" alt="Iklan">
                    </a>
                </div>
            `;
            
            // Render isi berita utama
            //const isiBerita = post.body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
            //let html = `
                //<h1 class="article-title">${post.title}</h1>
                //<img src="${post.image}" class="main-image" alt="${post.title}">
                //<div class="article-body">${isiBerita}</div>
            //`;

            // Tambah section berita terkait
            //const related = posts.filter(p => p.slug !== slugTujuan).slice(0, 5);
            
            const related = posts
            .filter(p => !postUrl.includes(p.slug || p.title.toLowerCase().replace(/\s+/g, '-')))
            .slice(0, 5);
            if (related.length > 0) {
                html += `<div class="related-section"><div class="related-title">Berita Lainnya</div>`;
                related.forEach(r => {
                    html += `
                        <a href="/berita.html?slug=${r.slug}" class="related-item">
                            <img src="${r.image}" alt="${r.title}">
                            <h4>${r.title}</h4>
                        </a>
                    `;
                });
                html += `</div>`;
            }

            contentArea.innerHTML = html;
            runningText.textContent = `INFO NEWS: ${post.title} | PULNEW.com - Update Informasi Terkini`;

        } catch (e) {
            console.error(e);
            contentArea.innerHTML = "Berita tidak dapat dimuat saat ini.<br><small>Silakan refresh atau kembali ke beranda</small>";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
