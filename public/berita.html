<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Detail Berita</title>
    <style>
        /* Mengunci background agar putih bersih */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; z-index: 10; }
        .logo-text { font-size: 22px; font-weight: 900; color: #1a237e; }
        .logo-text span { color: #d32f2f; }
        .btn-beranda { color: #d32f2f; font-weight: bold; text-decoration: none; font-size: 14px; border: 1px solid #d32f2f; padding: 5px 12px; border-radius: 4px; }

        /* AREA KONTEN (RAPAT KE ATAS) */
        .content-wrapper { flex: 1; overflow-y: auto; padding: 10px 20px; background: #ffffff; }
        .article-box { max-width: 650px; margin: 0 auto; }
        .article-title { font-size: 24px; font-weight: 800; margin: 5px 0 15px 0; line-height: 1.2; color: #000; }
        .main-image { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .article-body { font-size: 17px; line-height: 1.6; color: #333; text-align: justify; padding-bottom: 20px; }

        /* RUNNING TEXT (INFO NEWS) */
        .footer-ticker { background: #d32f2f; color: white; padding: 10px; font-size: 13px; white-space: nowrap; overflow: hidden; z-index: 10; width: 100%; flex-shrink: 0; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-text">PUL<span>NEW</span>.com</div>
            <a href="https://pulnew.pages.dev/" class="btn-beranda">← Beranda</a>
        </header>

        <div class="content-wrapper">
            <div class="article-box" id="content-area">
                Memuat berita...
            </div>
        </div>

        <div class="footer-ticker">
            <div class="ticker-content" id="running-text">
                INFO NEWS: Sedang memuat berita terkini untuk Anda...
            </div>
        </div>
    </div>

    <script>
    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        try {
            const response = await fetch('https://pandangsaya2023.github.io/pulnew/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            const post = data.posts.find(p => p.slug === slugTujuan);
            
            if (post) {
                document.getElementById('content-area').innerHTML = `
                    <h1 class="article-title">${post.title}</h1>
                    <img src="${post.image}" class="main-image">
                    <div class="article-body">${post.body.replace(/\n/g, '<br><br>')}</div>
                `;
                document.getElementById('running-text').textContent = "INFO NEWS: " + post.title + " | Selamat Datang di PULNEW.com - Update Informasi Terkini ";
            }
        } catch (e) {
            document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
