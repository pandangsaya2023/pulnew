<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULNEW - Detail Berita</title>
    <style>
        /* Pengaturan Dasar */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #eee; }
        .logo-text { font-size: 20px; font-weight: 900; color: #1a237e; }
        .logo-text span { color: #d32f2f; }
        
        /* TOMBOL BERANDA - Biru Sejuk */
        .btn-beranda { background: #e3f2fd; color: #1565c0; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; text-decoration: none; border: 1px solid #bbdefb; }

        /* AREA KONTEN - Rapat & Responsif */
        .content-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
        .article-box { max-width: 600px; margin: 0 auto; word-wrap: break-word; }
        .article-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; line-height: 1.2; color: #000; }
        .main-image { width: 100%; height: auto; border-radius: 6px; margin-bottom: 15px; }
        
        /* Jarak Paragraf Diatur Rapat (10px) */
        .article-body { font-size: 16px; line-height: 1.5; color: #333; text-align: justify; word-break: break-word; }
        .article-body p { margin-bottom: 10px; }

        /* RUNNING TEXT - Tetap Terlihat */
        .footer-ticker { background: #d32f2f; color: white; padding: 8px 10px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; z-index: 10; width: 100%; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-text">PUL<span>NEW</span>.com</div>
            <a href="https://pulnew.pages.dev/" class="btn-beranda">← Beranda</a>
        </header>

        <div class="content-wrapper">
            <div class="article-box" id="content-area">
                Memuat berita...
            </div>
        </div>

        <div class="footer-ticker">
            <div class="ticker-content" id="running-text">
                INFO NEWS: Sedang memuat informasi terkini...
            </div>
        </div>
    </div>

    <script>
    async function muatHalamanBerita() {
        const slugTujuan = new URLSearchParams(window.location.search).get('slug');
        try {
            const response = await fetch('https://pandangsaya2023.github.io/pulnew/posts.json?t=' + new Date().getTime());
            const data = await response.json();
            const post = data.posts.find(p => p.slug === slugTujuan);
            
            if (post) {
                // Membungkus setiap paragraf dengan <p> agar jaraknya bisa dikontrol lewat CSS
                const isiBerita = post.body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
                
                document.getElementById('content-area').innerHTML = `
                    <h1 class="article-title">${post.title}</h1>
                    <img src="${post.image}" class="main-image">
                    <div class="article-body">${isiBerita}</div>
                `;
                document.getElementById('running-text').textContent = "INFO NEWS: " + post.title + " | PULNEW.com - Update Informasi Terkini ";
            }
        } catch (e) {
            document.getElementById('content-area').innerHTML = "Artikel tidak ditemukan.";
        }
    }
    muatHalamanBerita();
    </script>
</body>
</html>
