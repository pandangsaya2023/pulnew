<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Berita</title>
  <style>
    /* CSS kamu tetap sama, gak perlu diubah */
   .news-hero img{width:100%;height:300px;object-fit:cover}
   .news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:20px 0}
   .news-card img{width:100%;height:180px;object-fit:cover}
   .card-badge{padding:4px 10px;border-radius:4px;color:#fff;font-size:12px}
   .trending-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #eee}
   .trending-number{font-size:24px;font-weight:bold;color:#AD212F}
   .carousel-scroll{display:flex;gap:16px;overflow-x:auto;padding:10px 0}
   .carousel-item{min-width:250px}
   .carousel-item img{width:100%;height:140px;object-fit:cover}
   .section-title{margin:30px 0 15px;font-size:22px}
  </style>
</head>
<body>

  <div id="news-container"></div>

  <script>
    const kategoriWarna = {
      'BERITA': '#AD212F',
      'POLITIK': '#2E86AB',
      'OLAHRAGA': '#F18F01',
      'TEKNOLOGI': '#C73E1D',
      'EKONOMI': '#2ECC71'
    };

    function tampilkanBerita(posts) {
      const container = document.getElementById('news-container');
      if (posts.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#666">Belum ada berita</div>';
        return;
      }

      let html = '';

      // Hero
      const hero = posts[0];
      const warnaHero = kategoriWarna[hero.kategori?.toUpperCase()] || '#AD212F';
      html += `
        <a href="berita.html?slug=${hero.slug}" class="news-hero">
          <img src="${hero.image}" alt="${hero.title}" loading="lazy">
          <div class="hero-content">
            <span class="card-badge" style="background: ${warnaHero}">${hero.kategori || 'BERITA'}</span>
            <p style="margin:8px 0; color:#ccc; font-size:15px">${hero.content || (hero.body? hero.body.substring(0, 180) + '...' : '')}</p>
            <h2>${hero.title}</h2>
          </div>
        </a>
      `;

      // News Grid
      if (posts.length > 1) {
        html += '<div class="news-grid">';
        posts.slice(1, 6).forEach(post => {
          const warna = kategoriWarna[post.kategori?.toUpperCase()] || '#AD212F';
          html += `
            <a href="berita.html?slug=${post.slug}" class="news-card">
              <img src="${post.image}" alt="${post.title}" loading="lazy">
              <div class="card-content">
                <span class="card-badge" style="background: ${warna}">${post.kategori || 'BERITA'}</span>
                <p style="font-size:14px; color:#666; margin:4px 0">${post.content || (post.body? post.body.substring(0, 180) + '...' : '')}</p>
                <h3>${post.title}</h3>
              </div>
            </a>
          `;
        });
        html += '</div>';
      }

      // Trending
      if (posts.length > 5) {
        html += '<h3 class="section-title">🔥 Trending Hari Ini</h3>';
        html += '<div class="trending-list">';
        posts.slice(5, 10).forEach((post, index) => {
          const warna = kategoriWarna[post.kategori?.toUpperCase()] || '#AD212F';
          html += `
            <a href="berita.html?slug=${post.slug}" class="trending-item">
              <div class="trending-number">${index + 1}</div>
              <div class="trending-content">
                <span class="card-badge" style="background: ${warna}">${post.kategori || 'BERITA'}</span>
                <p style="font-size:13px; color:#666; margin:2px 0">${post.content || (post.body? post.body.substring(0, 120) + '...' : '')}</p>
                <h4>${post.title}</h4>
              </div>
            </a>
          `;
        });
        html += '</div>';
      }

      // Berita Lain
      if (posts.length > 10) {
        html += '<h3 class="section-title">Berita Lain</h3>';
        html += '<div class="latest-carousel"><div class="carousel-scroll">';
        posts.slice(10, 50).forEach(post => {
          const warna = kategoriWarna[post.kategori?.toUpperCase()] || '#AD212F';
          html += `
            <a href="berita.html?slug=${post.slug}" class="carousel-item">
              <img src="${post.image}" alt="${post.title}" loading="lazy">
              <div class="carousel-content">
                <span class="card-badge" style="background: ${warna}">${post.kategori || 'BERITA'}</span>
                <p style="font-size:13px; color:#666; margin:2px 0">${post.content || (post.body? post.body.substring(0, 100) + '...' : '')}</p>
                <h4>${post.title}</h4>
              </div>
            </a>
          `;
        });
        html += '</div></div>';
      }

      container.innerHTML = html;
    }

    function updateRunningText(posts) {
      const containerTop = document.getElementById('running-text-container');
      if (!containerTop || posts.length === 0) return;
      let htmlContent = '';
      posts.slice(0, 10).forEach(post => {
        htmlContent += `<a href="berita.html?slug=${post.slug}" class="ticker-item">🔥 ${post.title}</a> &nbsp;&nbsp;&nbsp;`;
      });
      containerTop.innerHTML = htmlContent;
    }

    // Ambil data berita dari folder public/posts
    async function ambilDataBerita() {
      try {
        const res = await fetch('/public/posts/');
        const files = await res.json(); // kalau kamu punya index.json
        // kalau gak ada, kamu harus list manual file json nya
        const posts = await Promise.all(
          files.map(f => fetch(`/public/posts/${f}`).then(r => r.json()))
        );
        posts.sort((a,b) => new Date(b.date) - new Date(a.date));
        tampilkanBerita(posts);
        updateRunningText(posts);
      } catch(e) {
        console.error('Gagal ambil berita:', e);
      }
    }

    ambilDataBerita();
  </script>

</body>
</html>
